syntax = "proto3";

package engram.sovereignty.v1;

option go_package = "github.com/cuongct220020/engram-sovereign-fsm/x/sovereignty/types";

import "engram/sovereignty/v1/state.proto";

// Cấu trúc khởi tạo máy trạng thái Engram FSM
message GenesisState {
  FSMState          fsm_state             = 1; // Thường khởi tạo là FSM_STATE_ANCHORED
  uint64            safe_blocks_counter   = 2; // Bộ đếm biến `safe_blocks` trong TLA+
  uint64            hysteresis_wait_limit = 3; // Tham số hệ thống giới hạn HYSTERESIS_WAIT trên giấy
  PeripheralMetrics initial_metrics       = 4; // Trạng thái sensor lúc khởi tạo
}