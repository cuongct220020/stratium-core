syntax = "proto3";

package engram.sovereignty.v1;

option go_package = "github.com/cuongct220020/engram-sovereign-fsm/x/sovereignty/types";

// Thư viện annotations của Cosmos v0.50+ dùng để định tuyến bộ ký chữ ký tự động
import "cosmos/msg/v1/msg.proto";
import "engram/sovereignty/v1/state.proto";

// Dịch vụ xử lý chữ ký giao dịch (Msg Server)
service Msg {
  option (cosmos.msg.v1.service) = true;

  // Giao dịch đẩy chứng chỉ ZK Proof phục hồi lên chuỗi (Phục vụ E8/E9)
  rpc SubmitRecoveryProof(MsgSubmitRecoveryProofRequest) returns (MsgSubmitRecoveryProofResponse);

  // Mạch tiêm lỗi cục bộ định tính phục vụ kịch bản lỗi (Phục vụ E2-E7)
  rpc InjectFault(MsgInjectFaultRequest) returns (MsgInjectFaultResponse);
}

message MsgSubmitRecoveryProofRequest {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1; // Validator hoặc rpc node gửi chứng chỉ
  bytes  zk_proof  = 2; // Chuỗi byte thô của bằng chứng Noir ZK sinh ra ngoài chuỗi
}

message MsgSubmitRecoveryProofResponse {} // Trả về trống nếu ZK Verify thành công

message MsgInjectFaultRequest {
  option (cosmos.msg.v1.signer) = "sender";
  string            sender  = 1; // Tài khoản quản trị môi trường thử nghiệm
  PeripheralMetrics fault_inputs = 2; // Cấu hình thông số lỗi môi trường muốn ép chuỗi tuân theo
}

message MsgInjectFaultResponse {}