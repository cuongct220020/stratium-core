syntax = "proto3";

package engram.sovereignty.v1;

// Đường dẫn sinh mã nguồn Go sẽ hướng thẳng vào types của module execution layer
option go_package = "github.com/cuongct220020/engram-sovereign-fsm/x/sovereignty/types";

// Định nghĩa Enum ánh xạ 1:1 từ biến fsm_state trong EngramConsensus.tla
enum FSMState {
	FSM_STATE_UNSPECIFIED = 0;
	FSM_STATE_ANCHORED    = 1; // Mạng hoạt động bình thường, checkpoint lên BTC ổn định
	FSM_STATE_SUSPICIOUS  = 2; // Cảnh báo Gray Failure (Bitcoin nghẽn nhẹ)
	FSM_STATE_SOVEREIGN   = 3; // Kích hoạt Circuit Breaker, cô lập chuỗi, dùng BFT stake weight
	FSM_STATE_RECOVERING  = 4; // Ngoại vi hồi phục, đang tích lũy safe_blocks
}

// Định nghĩa cấu trúc dữ liệu tổng hợp từ các ngoại vi cảm biến (networkSensorVars)
message PeripheralMetrics {
	uint64 bitcoin_finality_gap = 1; // T_delta (số block BTC bị trễ checkpoint)
	bool   da_receipt_valid     = 2; // Trạng thái chứng chỉ Data Availability trên Celestia
	bool   p2p_quality_healthy  = 3; // Trạng thái kết nối từ Tri-interface Profiler
}