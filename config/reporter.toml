# Babylon Vigilante Reporter Configuration
# Reports Bitcoin finality back to Engram

[log]
# Log level: trace, debug, info, warn, error
level = "info"
# Format: json or plain
format = "plain"

[reporter]
# The address where the Bitcoin indexer is listening
bitcoin_indexer_host = "http://bitcoin-node-01:18332"
# bitcoin_indexer_host = "http://bitcoin-node-02:18332"  # For units 2-3, use node-02

# The address where the Engram node RPC is listening
engram_rpc_host = "http://VALIDATOR_HOST:26657"

# The address where the BTC reporter is listening
reporter_btc_host = "http://localhost:8081"

# The interval to monitor Bitcoin finality
finality_check_interval_ms = 5000

# Number of blocks to keep in memory
block_cache_size = 1000

# Enable metrics collection
metrics_enabled = true
metrics_port = 9091

[babylon]
# Babylon checkpoint config
checkpoint_enabled = true
checkpoint_interval_blocks = 100
