name: bitcoin-regtest-cluster

services:
  bitcoin-node01:
    image: lncm/bitcoind:${BITCOIN_VERSION:-v25.0}
    container_name: bitcoin-node01
    hostname: bitcoin-node01
    networks:
      bitcoin-net:
        ipv4_address: 172.21.0.10
    ports:
      - "18443:18443"   # RPC
      - "18444:18444"   # P2P
      - "28332:28332"   # ZMQ block
      - "28333:28333"   # ZMQ tx
    environment:
      - BITCOIN_NETWORK=regtest
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER:-engram_admin}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD:-secure_password_123}
    env_file:
      - ../.env
    volumes:
      - ../data/bitcoin-node01:/home/bitcoin/.bitcoin
    command:
      -printtoconsole
      -regtest=1
      -server=1
      -txindex=1
      -rpcuser=${BITCOIN_RPC_USER}
      -rpcpassword=${BITCOIN_RPC_PASSWORD}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -zmqpubrawblock=tcp://0.0.0.0:28332
      -zmqpubrawtx=tcp://0.0.0.0:28333
      -addnode=bitcoin-node02:18444
      -fallbackfee=0.0002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=${BITCOIN_RPC_USER}", "-rpcpassword=${BITCOIN_RPC_PASSWORD}", "getblockcount"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M


  bitcoin-node02:
    image: lncm/bitcoind:${BITCOIN_VERSION:-v25.0}
    container_name: bitcoin-node02
    hostname: bitcoin-node02
    networks:
      bitcoin-net:
        ipv4_address: 172.21.0.11
    ports:
      - "19443:18443"     # RPC
      - "19444:18444"     # P2P
      - "29332:28332"     # ZMQ block
      - "29333:28333"     # ZMQ tx
    environment:
      - BITCOIN_NETWORK=regtest
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER:-engram_admin}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD:-secure_password_123}
    env_file:
      - ../.env
    volumes:
      - ../data/bitcoin-node02:/home/bitcoin/.bitcoin
    command:
      -printtoconsole
      -regtest=1
      -server=1
      -txindex=1
      -rpcuser=${BITCOIN_RPC_USER}
      -rpcpassword=${BITCOIN_RPC_PASSWORD}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -zmqpubrawblock=tcp://0.0.0.0:29332
      -zmqpubrawtx=tcp://0.0.0.0:29333
      -addnode=bitcoin-node01:18444
      -fallbackfee=0.0002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=${BITCOIN_RPC_USER}", "-rpcpassword=${BITCOIN_RPC_PASSWORD}", "getblockcount"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M


networks:
  bitcoin-net:
    name: bitcoin-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "br-bitcoin"
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1